<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMEG PRO v2.0 - SYSTEM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: black; margin: 0; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        #root { min-height: 100vh; }
        .selection-red::selection { background: #dc2626; color: white; }
    </style>
</head>
<body class="selection-red">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Icônes SVG inline — pas de dépendance externe
        const Icon = ({ d, size = 22, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d}/></svg>
        );
        const LayoutDashboard = ({ size, className }) => <Icon size={size} className={className} d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z" />;
        const UserPlus = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
        );
        const Search = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        );
        const CheckCircle2 = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/>
            </svg>
        );
        const Pencil = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        );
        const Trash = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
        );
        const Printer = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
            </svg>
        );

        const API_URL = 'https://smeg.archiatech.com/api';

        const CommandMenu = ({ isOpen, onClose, collabs, setView, setSelectedId, updateCollab, onDelete, onEdit }) => {
            const [search, setSearch] = useState('');
            useEffect(() => { if (!isOpen) setSearch(''); }, [isOpen]);
            if (!isOpen) return null;

            const filteredCollabs = collabs.filter(c =>
                c.name.toLowerCase().includes(search.toLowerCase()) ||
                c.company.toLowerCase().includes(search.toLowerCase()) ||
                c.ticket.toString().includes(search)
            );

            const handleCheckAll = async (collab) => {
                const updatedTasks = { ...collab.tasks };
                ["Edge", "Office", "Teams", "SkyRemote", "ZScaler", "Printers", "BOX", "GLPI", "Intune"].forEach(t => {
                    updatedTasks[t] = true;
                });
                await updateCollab(collab.id, { ...collab, tasks: updatedTasks, stepReached: 5 });
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-start justify-center pt-[15vh] px-4 bg-black/95 backdrop-blur-xl animate-in fade-in duration-300" onClick={onClose}>
                    <div className="w-full max-w-2xl bg-slate-900 border-2 border-red-600/30 rounded-[2.5rem] shadow-[0_0_80px_-20px_rgba(220,38,38,0.5)] overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-4 p-8 border-b border-slate-800 bg-red-600/5">
                            <Search className="text-red-500" size={28} />
                            <input autoFocus placeholder="RECHERCHE GLOBALE..." className="flex-1 bg-transparent border-none outline-none text-2xl font-black text-white placeholder:text-slate-700 uppercase italic tracking-tighter" value={search} onChange={e => setSearch(e.target.value)} />
                            <div className="bg-black px-3 py-1 rounded-lg border border-red-600/20"><span className="text-[10px] font-black text-red-500">ESC</span></div>
                        </div>
                        <div className="max-h-[60vh] overflow-y-auto p-6 space-y-4">
                            {search.length === 0 && (
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => { setView('dashboard'); onClose(); }} className="flex flex-col items-center gap-3 p-8 rounded-[2rem] bg-slate-800/40 border border-slate-800 hover:border-red-600 hover:bg-red-600/10 transition-all group">
                                        <LayoutDashboard size={32} className="text-slate-500 group-hover:text-red-500 transition-colors" />
                                        <span className="font-black text-xs text-white uppercase tracking-widest">Dashboard</span>
                                    </button>
                                    <button onClick={() => { setView('add'); onClose(); }} className="flex flex-col items-center gap-3 p-8 rounded-[2rem] bg-slate-800/40 border border-slate-800 hover:border-red-600 hover:bg-red-600/10 transition-all group">
                                        <UserPlus size={32} className="text-slate-500 group-hover:text-red-500 transition-colors" />
                                        <span className="font-black text-xs text-white uppercase tracking-widest">Importer</span>
                                    </button>
                                </div>
                            )}
                            {filteredCollabs.map(c => (
                                <div key={c.id} className="w-full flex items-center justify-between p-6 rounded-[2rem] bg-black/40 border border-slate-800 hover:border-red-600 transition-all group cursor-pointer" onClick={() => { setSelectedId(c.id); setView('details'); onClose(); }}>
                                    <div className="flex items-center gap-5">
                                        <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white font-black italic text-xl shadow-lg shadow-red-600/20">{c.name.charAt(0)}</div>
                                        <div className="text-left">
                                            <div className="font-black text-lg text-white uppercase italic tracking-tighter">{c.name}</div>
                                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">{c.company}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-[10px] font-black text-red-500 uppercase bg-red-600/10 px-3 py-1 rounded-lg border border-red-600/20">#{c.ticket}</span>
                                        <button onClick={(e) => { e.stopPropagation(); onEdit(c); onClose(); }} className="w-8 h-8 flex items-center justify-center rounded-xl text-slate-700 border border-slate-800 hover:border-slate-500 hover:text-white hover:bg-slate-800 transition-all opacity-0 group-hover:opacity-100">
                                            <Pencil size={14}/>
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); onClose(); }} className="w-8 h-8 flex items-center justify-center rounded-xl text-slate-700 border border-slate-800 hover:border-red-600 hover:text-red-500 hover:bg-red-600/10 transition-all opacity-0 group-hover:opacity-100">
                                            <Trash size={14}/>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [collabs, setCollabs] = useState([]);
            const [view, setView] = useState('dashboard');
            const [selectedId, setSelectedId] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [form, setForm] = useState({ name: '', company: '', ticket: '' });
            const [formError, setFormError] = useState('');
            const [editForm, setEditForm] = useState({ name: '', company: '', ticket: '' });

            useEffect(() => {
                loadCollabs();
                const h = (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setIsMenuOpen(p => !p); }
                    if (e.key === 'Escape') setIsMenuOpen(false);
                };
                window.addEventListener('keydown', h);
                return () => window.removeEventListener('keydown', h);
            }, []);

            const loadCollabs = async () => {
                try { const res = await axios.get(`${API_URL}/collaborators`); setCollabs(res.data); } catch(e){ console.error("API Error"); }
            };

            const updateCollab = async (id, data) => {
                await axios.put(`${API_URL}/collaborators/${id}`, data);
                await loadCollabs();
            };

            const deleteCollab = async (id) => {
                await axios.delete(`${API_URL}/collaborators/${id}`);
                await loadCollabs();
                if (selectedId === id) setView('dashboard');
            };

            const createCollab = async (e) => {
                e.preventDefault();
                if (!form.name.trim() || !form.company.trim() || !form.ticket) {
                    setFormError('Tous les champs sont obligatoires.');
                    return;
                }
                try {
                    await axios.post(`${API_URL}/collaborators`, form);
                    await loadCollabs();
                    setForm({ name: '', company: '', ticket: '' });
                    setFormError('');
                    setView('dashboard');
                } catch(e) {
                    setFormError('Erreur lors de la création.');
                }
            };

            const selected = collabs.find(c => c.id === selectedId);
            const avgProgression = collabs.length ? (collabs.reduce((acc, c) => acc + (c.stepReached/8)*100, 0) / collabs.length) : 0;

            return (
                <div className="flex h-screen bg-black text-slate-200">
                    <CommandMenu isOpen={isMenuOpen} onClose={() => setIsMenuOpen(false)} collabs={collabs} setView={setView} setSelectedId={setSelectedId} updateCollab={updateCollab} onDelete={(id) => deleteCollab(id)} onEdit={(c) => { setSelectedId(c.id); setEditForm({ name: c.name, company: c.company, ticket: c.ticket }); setView('edit'); }} />

                    <aside className="w-80 border-r border-slate-900 bg-black p-8 flex flex-col shrink-0">
                        <div className="flex items-center gap-4 mb-16">
                            <div className="w-14 h-14 bg-red-600 rounded-[1.2rem] flex items-center justify-center font-black text-white italic text-3xl shadow-2xl shadow-red-600/40">S</div>
                            <div>
                                <h1 className="text-2xl font-black italic text-white leading-none tracking-tighter">SMEG PRO</h1>
                                <p className="text-[10px] font-black text-red-600 uppercase tracking-[0.2em] mt-2">V2.0 RED SYSTEM</p>
                            </div>
                        </div>
                        <nav className="space-y-4 flex-1">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-4 py-6 px-8 rounded-[2rem] font-black uppercase italic text-sm tracking-tighter transition-all ${view==='dashboard'?'bg-red-600 text-white shadow-2xl shadow-red-600/30':'text-slate-600 hover:text-white'}`}><LayoutDashboard size={22}/> Dashboard</button>
                            <button onClick={() => setView('add')} className={`w-full flex items-center gap-4 py-6 px-8 rounded-[2rem] font-black uppercase italic text-sm tracking-tighter transition-all ${view==='add'?'bg-red-600 text-white shadow-2xl shadow-red-600/30':'text-slate-600 hover:text-white'}`}><UserPlus size={22}/> Importer</button>
                        </nav>
                        <div className="mt-auto p-6 bg-red-600/5 border border-red-600/20 rounded-[2.5rem] flex justify-between items-center">
                            <span className="text-4xl font-black text-white italic">{collabs.length}</span>
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Dossiers</span>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-12 bg-[#050505]">
                        {view === 'dashboard' && (
                            <div className="space-y-12 max-w-7xl mx-auto animate-in fade-in slide-in-from-top-4 duration-700">
                                <div className="flex justify-between items-end border-b-8 border-red-600 pb-10">
                                    <h2 className="text-8xl font-black uppercase italic text-white leading-none tracking-tighter">DOSSIERS</h2>
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-red-600 uppercase tracking-[0.4em] mb-2">Progression Moyenne</p>
                                        <p className="text-5xl font-black text-white italic leading-none">{Math.round(avgProgression)}%</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-8">
                                    {collabs.map(c => (
                                        <div key={c.id} onClick={() => { setSelectedId(c.id); setView('details'); }} className="bg-slate-900 border-2 border-slate-800 p-10 rounded-[3.5rem] cursor-pointer hover:border-red-600 hover:bg-red-600/[0.03] transition-all group shadow-2xl relative overflow-hidden active:scale-95">
                                            <div className="flex justify-between items-start mb-10">
                                                <div>
                                                    <h3 className="text-3xl font-black uppercase italic text-white group-hover:text-red-500 transition-colors leading-none tracking-tighter">{c.name}</h3>
                                                    <p className="text-xs font-black text-slate-500 uppercase mt-4 tracking-widest border-l-4 border-red-600 pl-4">{c.company}</p>
                                                </div>
                                                <span className="bg-black px-5 py-2 rounded-2xl text-[10px] font-black text-red-500 border border-red-600/20">TICKET #{c.ticket}</span>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                                    <span>Progression</span>
                                                    <span className="text-red-500">{Math.round((c.stepReached/8)*100)}%</span>
                                                </div>
                                                <div className="h-4 bg-black rounded-full overflow-hidden border border-slate-800 p-1 shadow-inner">
                                                    <div className="h-full bg-red-600 rounded-full transition-all duration-1000 shadow-[0_0_20px_rgba(220,38,38,0.6)]" style={{width: `${(c.stepReached/8)*100}%`}}></div>
                                                </div>
                                            </div>
                                            <div className="flex justify-end mt-6">
                                                <button onClick={(e) => { e.stopPropagation(); deleteCollab(c.id); }} className="flex items-center gap-2 px-5 py-3 rounded-2xl text-slate-700 border border-slate-800 hover:border-red-600 hover:text-red-500 hover:bg-red-600/10 transition-all text-[10px] font-black uppercase tracking-widest opacity-0 group-hover:opacity-100">
                                                    <Trash size={14}/> Supprimer
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {view === 'add' && (
                            <div className="max-w-2xl mx-auto animate-in fade-in slide-in-from-top-4 duration-700">
                                <div className="flex justify-between items-end border-b-8 border-red-600 pb-10 mb-12">
                                    <h2 className="text-8xl font-black uppercase italic text-white leading-none tracking-tighter">IMPORTER</h2>
                                    <button onClick={() => setView('dashboard')} className="w-16 h-16 bg-slate-900 rounded-[1.5rem] text-slate-500 text-2xl font-black border-2 border-slate-800 hover:border-red-600 hover:text-white transition-all">✖</button>
                                </div>
                                <form onSubmit={createCollab} className="bg-slate-900 border-2 border-slate-800 rounded-[3.5rem] p-12 shadow-2xl space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Nom du collaborateur</label>
                                        <input
                                            type="text"
                                            placeholder="Jean Dupont"
                                            value={form.name}
                                            onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                                            className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white placeholder:text-slate-700 transition-colors"
                                        />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Société</label>
                                        <input
                                            type="text"
                                            placeholder="ACME Corp"
                                            value={form.company}
                                            onChange={e => setForm(f => ({ ...f, company: e.target.value }))}
                                            className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white placeholder:text-slate-700 transition-colors"
                                        />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Numéro de ticket</label>
                                        <input
                                            type="number"
                                            placeholder="1042"
                                            value={form.ticket}
                                            onChange={e => setForm(f => ({ ...f, ticket: e.target.value }))}
                                            className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white placeholder:text-slate-700 transition-colors"
                                        />
                                    </div>
                                    {formError && (
                                        <p className="text-red-500 text-xs font-black uppercase tracking-widest">{formError}</p>
                                    )}
                                    <button type="submit" className="w-full py-8 bg-red-600 text-white rounded-[2rem] font-black uppercase italic text-lg shadow-2xl shadow-red-600/30 hover:scale-[1.02] active:scale-95 transition-all">
                                        Créer le dossier ➔
                                    </button>
                                </form>
                            </div>
                        )}
                        {view === 'details' && selected && (
                             <div className="max-w-6xl mx-auto space-y-12 animate-in fade-in duration-700">
                                <div className="bg-red-600 p-16 rounded-[4rem] flex justify-between items-center shadow-2xl shadow-red-600/20 relative overflow-hidden group">
                                    <div className="absolute right-[-100px] top-[-100px] w-96 h-96 bg-white/10 rounded-full blur-[120px] group-hover:scale-150 transition-transform duration-1000"></div>
                                    <h2 className="text-8xl font-black uppercase italic text-white leading-none tracking-tighter relative z-10">{selected.name}</h2>
                                    <button onClick={() => setView('dashboard')} className="w-24 h-24 bg-black/20 rounded-[2.5rem] text-white text-4xl font-black border-4 border-white/20 hover:bg-white hover:text-red-600 transition-all relative z-10">✖</button>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                    <div className="lg:col-span-2 bg-slate-900 border-2 border-slate-800 rounded-[4rem] p-12 shadow-2xl">
                                        <div className="flex justify-between items-center mb-12 border-b-4 border-slate-800 pb-8">
                                            <div>
                                                <h3 className="text-4xl font-black text-white uppercase italic tracking-tighter">Checklist É5</h3>
                                                <p className="text-[10px] font-black uppercase tracking-widest mt-2">
                                                    <span className="text-red-500">{Object.values(selected.tasks).filter(Boolean).length}</span>
                                                    <span className="text-slate-600"> / 9 tâches</span>
                                                </p>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => updateCollab(selected.id, { ...selected, tasks: Object.fromEntries(["Edge","Office","Teams","SkyRemote","ZScaler","Printers","BOX","GLPI","Intune"].map(t => [t, true])) })} className="flex items-center gap-2 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-700 text-slate-400 hover:border-red-600 hover:text-red-500 hover:bg-red-600/10 transition-all">
                                                    <CheckCircle2 size={14}/> Tout cocher
                                                </button>
                                                <button onClick={() => updateCollab(selected.id, { ...selected, tasks: Object.fromEntries(["Edge","Office","Teams","SkyRemote","ZScaler","Printers","BOX","GLPI","Intune"].map(t => [t, false])) })} className="flex items-center gap-2 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-700 text-slate-400 hover:border-slate-500 hover:text-white transition-all">
                                                    <CheckCircle2 size={14}/> Tout décocher
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {["Edge", "Office", "Teams", "SkyRemote", "ZScaler", "Printers", "BOX", "GLPI", "Intune"].map(task => (
                                                <label key={task} className={`flex items-center gap-6 p-8 rounded-[2.5rem] border-4 cursor-pointer transition-all ${selected.tasks[task] ? 'bg-red-600 border-red-600 text-white shadow-xl shadow-red-600/20' : 'bg-black/50 border-slate-800 text-slate-500 hover:border-red-600'}`}>
                                                    <input type="checkbox" checked={selected.tasks[task] || false} onChange={() => updateCollab(selected.id, { ...selected, tasks: { ...selected.tasks, [task]: !selected.tasks[task] } })} className="hidden" />
                                                    <div className={`w-10 h-10 rounded-2xl border-2 flex items-center justify-center transition-all ${selected.tasks[task] ? 'bg-white text-red-600 border-white' : 'bg-black border-slate-800'}`}>
                                                        {selected.tasks[task] && <CheckCircle2 size={24} />}
                                                    </div>
                                                    <span className="text-xl font-black uppercase italic tracking-tighter">{task}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="bg-white p-12 rounded-[4rem] shadow-2xl flex flex-col gap-6">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">OPÉRATIONS SYSTÈME</h4>
                                            <button onClick={() => { setEditForm({ name: selected.name, company: selected.company, ticket: selected.ticket }); setView('edit'); }} className="w-full flex items-center justify-center gap-3 py-8 bg-black text-white rounded-[2rem] font-black uppercase italic text-sm hover:bg-slate-800 transition-all shadow-xl">
                                                <Pencil size={20}/> Modifier
                                            </button>
                                            <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-4 py-8 bg-black text-white rounded-[2rem] font-black uppercase italic text-sm hover:bg-red-600 transition-all shadow-xl group">
                                                <Printer size={24} className="group-hover:scale-110 transition-transform" /> IMPRIMER É6
                                            </button>
                                            <button onClick={() => updateCollab(selected.id, { ...selected, stepReached: selected.stepReached + 1 })} className="w-full py-8 bg-red-600 text-white rounded-[2rem] font-black uppercase italic text-sm shadow-xl shadow-red-600/30 hover:scale-105 transition-all">Étape Suivante ➔</button>
                                            <button onClick={() => updateCollab(selected.id, { ...selected, stepReached: 0 })} className="w-full py-5 bg-black border-2 border-slate-800 text-slate-500 rounded-[2rem] font-black uppercase italic text-xs hover:border-slate-600 hover:text-slate-300 transition-all">↺ Réinitialiser progression</button>
                                            <button onClick={() => deleteCollab(selected.id)} className="w-full flex items-center justify-center gap-3 py-6 bg-black text-slate-600 border-2 border-slate-800 rounded-[2rem] font-black uppercase italic text-sm hover:border-red-600 hover:text-red-500 transition-all">
                                                <Trash size={18}/> Supprimer
                                            </button>
                                        </div>
                                    </div>
                                </div>
                             </div>
                        )}
                        {view === 'edit' && selected && (
                            <div className="max-w-2xl mx-auto animate-in fade-in slide-in-from-top-4 duration-700">
                                <div className="flex justify-between items-end border-b-8 border-red-600 pb-10 mb-12">
                                    <div>
                                        <h2 className="text-8xl font-black uppercase italic text-white leading-none tracking-tighter">MODIFIER</h2>
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-4 border-l-4 border-red-600 pl-4">{selected.name}</p>
                                    </div>
                                    <button onClick={() => setView('details')} className="w-16 h-16 bg-slate-900 rounded-[1.5rem] text-slate-500 text-2xl font-black border-2 border-slate-800 hover:border-red-600 hover:text-white transition-all">✖</button>
                                </div>
                                <form onSubmit={async (e) => { e.preventDefault(); await updateCollab(selected.id, { ...selected, name: editForm.name, company: editForm.company, ticket: Number(editForm.ticket) }); setView('details'); }} className="bg-slate-900 border-2 border-slate-800 rounded-[3.5rem] p-12 shadow-2xl space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Nom du collaborateur</label>
                                        <input type="text" value={editForm.name} onChange={e => setEditForm(f => ({ ...f, name: e.target.value }))} className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white transition-colors" />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Société</label>
                                        <input type="text" value={editForm.company} onChange={e => setEditForm(f => ({ ...f, company: e.target.value }))} className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white transition-colors" />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Numéro de ticket</label>
                                        <input type="number" value={editForm.ticket} onChange={e => setEditForm(f => ({ ...f, ticket: e.target.value }))} className="w-full bg-black border-2 border-slate-800 focus:border-red-600 outline-none rounded-[1.5rem] px-8 py-6 text-xl font-black text-white transition-colors" />
                                    </div>
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setView('details')} className="flex-1 py-8 bg-black border-2 border-slate-800 rounded-[2rem] text-slate-400 font-black uppercase italic text-sm hover:border-slate-600 hover:text-white transition-all">Annuler</button>
                                        <button type="submit" className="flex-1 py-8 bg-red-600 text-white rounded-[2rem] font-black uppercase italic text-sm shadow-2xl shadow-red-600/30 hover:scale-[1.02] active:scale-95 transition-all">Enregistrer ➔</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
