services:

  smeg-frontend:
    image: nginx:alpine
    container_name: smeg-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS
      - "traefik.http.routers.smeg-frontend.rule=Host(`smeg.archiatech.com`)"
      - "traefik.http.routers.smeg-frontend.entrypoints=websecure"
      - "traefik.http.routers.smeg-frontend.tls=true"
      - "traefik.http.routers.smeg-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.smeg-frontend.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.smeg-frontend-http.rule=Host(`smeg.archiatech.com`)"
      - "traefik.http.routers.smeg-frontend-http.entrypoints=web"
      - "traefik.http.routers.smeg-frontend-http.middlewares=redirect-https@file"
      - "traefik.http.routers.smeg-frontend-http.service=smeg-frontend"
    networks:
      - traefik-public
    restart: unless-stopped

  smeg-backend:
    image: node:18-alpine
    container_name: smeg-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install --silent && node server.js"
    environment:
      - PORT=3000
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS
      - "traefik.http.routers.smeg-api.rule=Host(`smeg.archiatech.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.smeg-api.entrypoints=websecure"
      - "traefik.http.routers.smeg-api.tls=true"
      - "traefik.http.routers.smeg-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.smeg-api.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.smeg-api-http.rule=Host(`smeg.archiatech.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.smeg-api-http.entrypoints=web"
      - "traefik.http.routers.smeg-api-http.middlewares=redirect-https@file"
      - "traefik.http.routers.smeg-api-http.service=smeg-api"
    networks:
      - traefik-public
      - smeg-internal
    restart: unless-stopped

networks:
  traefik-public:
    external: true
  smeg-internal:
    driver: bridge
